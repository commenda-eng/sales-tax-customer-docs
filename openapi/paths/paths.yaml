---
"/webhooks":
  post:
    summary: Create a new webhook.
    description: Register your webhook with Commenda.
    operationId: registerWebhook
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/CreateWebhookRequest"
    responses:
      '200':
        description: Sales tax registration response
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/CreateWebhookResponse"
                message:
                  type: string
                  example: Successfully registered webhook.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  get:
    summary: List all webhook.
    description: Get a list of all webhooks registered with Commenda.
    operationId: listAllWebhooks
    responses:
      '200':
        description: Sales tax registration response
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    webhooks:
                      "$ref": "../components/components.yaml#/components/schemas/GetWebhookResponse"
                message:
                  type: string
                  example: Successfully fetched webhooks.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/webhooks/:id":
  post:
    summary: Update a webhook
    description: Update an existing webhook.
    operationId: updateWebhook
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/UpdateWebhookRequest"
    responses:
      '200':
        description: Sales tax registration response
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Successfully updated webhook.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  get:
    summary: Get a webhook.
    description: Get a webhook registered with Commenda.
    operationId: getWebhook
    responses:
      '200':
        description: Sales tax registration response
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/GetWebhookResponse"
                message:
                  type: string
                  example: Successfully fetched webhook.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  delete:
    summary: Delete a webhook
    description: Delete an existing webhook.
    operationId: deleteWebhook
    responses:
      '204':
        description: Sales tax registration response
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/webhooks/test/trigger/:id":
  post:
    summary: Test your webhook
    description: Trigger a test against your webhook.
    operationId: testWebhook
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              event_data:
                type: object
                description: Data to inject into event.data. When the webhook will
                  be triggered the event will have this data.
    responses:
      '200':
        description: Sales tax registration response
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Successfully triggered webhook.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/products":
  post:
    summary: Add a new product.
    description: Create a new product for a corporation.
    operationId: createProduct
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/CreateProduct"
    responses:
      '200':
        description: Create product response.
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/Product"
                message:
                  type: string
                  example: Successfully created product.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  get:
    summary: Get a product by id.
    operationId: getProduct
    parameters:
    - name: corporation_id
      in: query
      description: The unique identifier for a corporation to filter the products
        by.
      required: true
      schema:
        type: string
    - name: cursor
      in: query
      description: Cursor for pagination
      required: false
      schema:
        type: string
    - name: limit
      in: query
      description: Number of items to return per page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    responses:
      '200':
        description: Fetch a product response.
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    products:
                      type: array
                      items:
                        "$ref": "../components/components.yaml#/components/schemas/Product"
                    cursor:
                      type: string
                message:
                  type: string
                  example: Successfully fetched products.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/products/bulk_upload/csv":
  post:
    summary: Bulk upload products
    description: Submit a CSV file of products for processing
    operationId: submitBulkProducts
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - file_id
            properties:
              file_id:
                type: string
                description: The ID of a previously uploaded CSV file via the `/files` endpoint.
              corporation_id:
                type: string
                description: The unique identifier for a corporation to associate with these products.
    responses:
      '200':
        description: Successful product import job creation
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    job:
                      "$ref": "../components/job.yaml#/schemas/Job"
                message:
                  type: string
                  example: Successfully started product import job.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/products/:id":
  post:
    summary: Update a product.
    description: Update an existing product by id.
    operationId: updateProduct
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/UpdateProduct"
    responses:
      '200':
        description: Create product response.
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Successfully updated product.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  get:
    summary: Get a product by id.
    operationId: getProductById
    responses:
      '200':
        description: Fetch a product response.
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/Product"
                message:
                  type: string
                  example: Successfully fetched product.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  delete:
    summary: Delete a product by id.
    operationId: deleteProduct
    responses:
      '204':
        description: Delete a product response.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/products/{id}/customs-code":
  post:
    summary: Add or update a customs code for a product.
    description: Manage customs code for each product by jurisdiction.
    operationId: updateProductCustomsCode
    parameters:
    - in: path
      required: true
      name: id
      schema:
        type: string
      description: The unique identifier of the product to update.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - country
            - customs_code
            properties:
              country:
                "$ref": "../components/components.yaml#/components/schemas/Country"
              # customs_code:
              #   "$ref": "../components/components.yaml#/components/schemas/customs_code"
    responses:
      '200':
        description: Set product customs code response.
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Successfully set product customs code.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  delete:
    summary: Delete a customs code for a product.
    operationId: deleteProductCustomsCode
    parameters:
    - in: path
      required: true
      name: id
      schema:
        type: string
      description: The unique identifier of the product to update.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - country
            properties:
              country:
                description: ISO 3166 2-letter country code representing the country
                  to remove the country code for.
                "$ref": "../components/components.yaml#/components/schemas/Country"
    responses:
      '204':
        description: Deleted customs code for product.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/corporations":
  post:
    summary: Add a new corporation.
    description: Create a new corporation for a sales tax partner.
    operationId: createCorporation
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/corporations.yaml#/schemas/CreateCorporation"
    responses:
      '200':
        description: Sales tax registration response
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/corporations.yaml#/schemas/Corporation"
                message:
                  type: string
                  example: Successfully created corporation.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  get:
    summary: Get all corporations.
    description: Get all corporations associated with a sales tax partner.
    operationId: getCorporations
    parameters:
    - name: cursor
      in: query
      description: Cursor for pagination
      required: false
      schema:
        type: string
    - name: limit
      in: query
      description: Number of items to return per page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    responses:
      '200':
        description: Get all corporations response.
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  required:
                  - corporations
                  properties:
                    corporations:
                      type: array
                      items:
                        "$ref": "../components/corporations.yaml#/schemas/Corporation"
                    cursor:
                      type: string
                message:
                  type: string
                  example: Successfully fetched corporations.
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/corporations/{id}":
  get:
    summary: Get corporation.
    description: Get a corporation by id.
    operationId: getCorporation
    parameters:
    - in: path
      required: true
      name: id
      schema:
        type: string
      description: The unique identifier of the corporation to fetch.
    responses:
      '200':
        description: Get one corporation response.
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/corporations.yaml#/schemas/Corporation"
                message:
                  type: string
                  example: Successfully fetched corporation.
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  post:
    summary: Update a corporation.
    description: Update details for a corporation.
    operationId: updateCorporation
    parameters:
    - in: path
      required: true
      name: id
      schema:
        type: string
      description: The unique identifier of the corporation to update.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/corporations.yaml#/schemas/UpdateCorporation"
    responses:
      '200':
        description: Update one corporation response.
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Successfully updated corporation.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  delete:
    summary: Delete corporation.
    description: Delete a corporation by id.
    operationId: deleteCorporation
    parameters:
    - in: path
      required: true
      name: id
      schema:
        type: string
      description: The unique identifier of the corporation to delete.
    responses:
      '204':
        description: Delete one corporation response.
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations":
  post:
    summary: Create a registration
    description: Create a new sales tax registration using a registration_content_id obtained from the content/registration-input-options endpoint.
    operationId: createRegistration
    tags:
      - Registrations
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/RegistrationPost"
    responses:
      '201':
        description: Registration created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/RegistrationGet"
                message:
                  type: string
                  example: Successfully created registration.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/list":
  post:
    summary: List registrations
    description: List all registrations for a corporation with optional filters.
    operationId: listRegistrations
    tags:
      - Registrations
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/registrations.yaml#/schemas/ListRegistrationsRequest"
    responses:
      '200':
        description: Registrations retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    registrations:
                      type: array
                      items:
                        "$ref": "../components/components.yaml#/components/schemas/RegistrationGet"
                message:
                  type: string
                  example: Successfully fetched registrations.
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/{registration_id}":
  get: 
    summary: Get a registration
    description: Retrieve a single registration by its ID.
    operationId: getRegistration
    tags:
      - Registrations
    parameters:
    - in: path
      required: true
      name: registration_id
      schema:
        type: string
        format: uuid
      description: The unique identifier of the registration.
    responses: 
      '200':
        description: Registration retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/RegistrationGet"
                message:
                  type: string
                  example: Successfully fetched registration.
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"      
  post:
    summary: Update a registration
    description: Update an existing registration with new details such as tax types, frequency, or credentials.
    operationId: updateRegistration
    tags:
      - Registrations
    parameters:
    - in: path
      required: true
      name: registration_id
      schema:
        type: string
        format: uuid
      description: The unique identifier of the registration to update.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/RegistrationIdPost"
    responses:
      '200':
        description: Registration updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/RegistrationGet"
                message:
                  type: string
                  example: Successfully updated registration.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  delete:
    summary: Delete a registration
    description: Delete a registration. Only registrations with validation_status of PENDING, INVALID, or VALIDATION_IN_PROGRESS can be deleted. VALID registrations cannot be deleted - use close or archive instead.
    operationId: deleteRegistration
    tags:
      - Registrations
    parameters:
    - in: path
      required: true
      name: registration_id
      schema:
        type: string
        format: uuid
      description: The unique identifier of the registration to delete.
    responses:
      '204':
        description: Registration deleted successfully
      '400':
        description: Bad request - cannot delete VALID registrations
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
      '404':
        description: Registration not found
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/{registration_id}/request-validation":
  post:
    summary: Request validation
    description: Submit a registration for validation by the Commenda team. Ensure all required fields (tax_registration_id, frequency, credentials) are set before calling this endpoint.
    operationId: requestRegistrationValidation
    tags:
      - Registrations
    parameters:
    - in: path
      required: true
      name: registration_id
      schema:
        type: string
        format: uuid
      description: The unique identifier of the registration to validate.
    responses:
      '200':
        description: Validation request submitted
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/RegistrationGet"
                message:
                  type: string
                  example: Successfully started validation process.
      '400':
        description: Bad request - missing required fields
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/{registration_id}/archive":
  post:
    summary: Archive a registration
    description: Archive a registration to stop tax calculations and hide from default list views. Archived registrations are completely excluded from tax processing. Use include_archived=true when listing to see archived registrations.
    operationId: archiveRegistration
    tags:
      - Registrations
    parameters:
    - in: path
      required: true
      name: registration_id
      schema:
        type: string
        format: uuid
      description: The unique identifier of the registration to archive.
    responses:
      '200':
        description: Registration archived successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/RegistrationGet"
                message:
                  type: string
                  example: Successfully archived registration.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/{registration_id}/close":
  post:
    summary: Close a registration
    description: Close a registration when you stop selling in a jurisdiction. The registration remains active for tax calculations within its date range (effective_start_date to effective_end_date). Use this when you have historical obligations to preserve.
    operationId: closeRegistration
    tags:
      - Registrations
    parameters:
    - in: path
      required: true
      name: registration_id
      schema:
        type: string
        format: uuid
      description: The unique identifier of the registration to close.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/registrations.yaml#/schemas/CloseRegistrationRequest"
    responses:
      '200':
        description: Registration closed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/RegistrationGet"
                message:
                  type: string
                  example: Successfully closed registration.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/content/available-jurisdictions":
  post:
    summary: List available jurisdictions
    description: Discover jurisdictions where you can create registrations. Use filters to narrow down by country, state, or tax type. Results are paginated using cursor-based pagination.
    operationId: listAvailableJurisdictions
    tags:
      - Registration Content
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/registrations.yaml#/schemas/JurisdictionsRequest"
    responses:
      '200':
        description: Jurisdictions retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/registrations.yaml#/schemas/JurisdictionsResponse"
                message:
                  type: string
                  example: Successfully fetched jurisdictions.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/content/registration-input-options":
  post:
    summary: Get registration options
    description: Get available tax types, frequencies, and registration_content_ids for specific jurisdictions. The registration_content_id is required when creating a registration.
    operationId: getRegistrationInputOptions
    tags:
      - Registration Content
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/registrations.yaml#/schemas/OptionsRequest"
    responses:
      '200':
        description: Options retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/registrations.yaml#/schemas/OptionsResponse"
                message:
                  type: string
                  example: Successfully fetched registration options.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/registrations/content/portal-fields":
  post:
    summary: Get portal credential fields
    description: Get the credential fields required for a specific registration content. These fields define what information you need to collect for automated tax filing.
    operationId: getPortalFields
    tags:
      - Registration Content
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/registrations.yaml#/schemas/PortalFieldsRequest"
    responses:
      '200':
        description: Portal fields retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/registrations.yaml#/schemas/PortalFieldsResponse"
                message:
                  type: string
                  example: Successfully fetched portal fields.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/calculate":
  post:
    summary: Calculate sales tax for a transaction
    operationId: calculateSalesTax
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/TaxCalculationRequest"
    responses:
      '200':
        description: Successful tax calculation
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/TaxCalculationResponse"
                message:
                  type: string
                  example: Successfully calculated tax.
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/calculate-customs-duty":
  post:
    summary: Calculate customs duty for a transaction
    operationId: calculateCustomsDuty
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/CustomsDutyCalculationRequest"
    responses:
      '200':
        description: Successful customs duty calculation
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    customs_rate:
                      type: number
                      description: Numeric value representing the customs duty rate
                        as a percentage (e.g., 6.25 for 6.25%).
                      example: 10.25
                    customs_duty_amount:
                      type: number
