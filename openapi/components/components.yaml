---
components:
  schemas:
    BulkTransactionMetadata:
      type: object
      properties:
        upload_id:
          type: string
          description: The unique identifier for the bulk transaction upload.
          example: 2535af08-a139-4d0c-9827-1651e46dfbcf
        file_name:
          type: string
          description: The name of the file uploaded.
          example: example.csv
        transaction_count:
          type: integer
          description: The number of transactions in the file.
          example: 100
        size:
          type: integer
          description: The size of the file in bytes.
          example: 1024
        corporation_id:
          type: string
          description: The unique identifier for a corporation.
          example: 2535af08-a139-4d0c-9827-1651e46dfbcf
        created_at:
          type: number
          description: Timestamp in UTC when this bulk transaction upload was created.
          example: 1727284490
    GetWebhookResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for this webhook. You will need this if
            you need to update or delete this webhook.
          example: 2535af08-a139-4d0c-9827-1651e46dfbcf
        api_version:
          type: string
          description: The version of the API for which you registered the webhook.
            This will be 'v1.0' for now. This helps to maintain backward compatibility.
            If in newer versions the event payload is changed, your webhook will keep
            receiving the payload from the original api version.
          example: v1.0
        name:
          type: string
          description: Optional name to define the purpose of the webhook.
          example: handle_existing_registrations_validation_failure
        topics:
          type: array
          items:
            type: string
            enum:
            - REGISTRATIONS.EXISTING.VALIDATION_FAILED
            - REGISTRATIONS.EXISTING.VALIDATION_SUCCEEDED
          description: An array of topics to listen to. When any of these topics are
            triggered, the webhook will be pinged.
        url:
          type: string
          description: Your webhook url that will be hit once a topic is triggered.
            Only https:// urls will work.
          example: https://bruno-simon.com/
        status:
          type: string
          enum:
          - ENABLED
          - DISABLED
          description: If the webhook is active or not. If a webhook id disabled it
            won't be called when a topic is triggered.
        created_at:
          type: number
          description: Timestamp in UTC when this webhook was created.
          example: 1727284490
    UpdateWebhookRequest:
      type: object
      properties:
        api_version:
          type: string
          description: The version of the API for which you registered the webhook.
            This helps to maintain backward compatibility. If in newer versions the
            event payload is changed, your webhook will keep receiving the payload from
            this api version. This will be 'v1.0' for now and we will come up with more
            versions and a changelog later.
        name:
          type: string
          description: Optional name to define the purpose of the webhook.
        topics:
          type: array
          items:
            type: string
            enum:
            - REGISTRATIONS.EXISTING.VALIDATION_FAILED
            - REGISTRATIONS.EXISTING.VALIDATION_SUCCEEDED
          description: An array of topics to listen to. When any of these topics are
            triggered, the webhook will be pinged.
        status:
          type: string
          enum:
          - ENABLED
          - DISABLED
          description: If the webhook is active or not. If a webhook is disabled it
            won't be called when a topic is triggered.
    CreateWebhookRequest:
      type: object
      required:
      - api_version
      - url
      - key
      - status
      - topics
      properties:
        api_version:
          type: string
          description: The version of the API for which you registered the webhook.
            This helps to maintain backward compatibility. If in newer versions the
            event payload is changed, your webhook will keep receiving the payload from
            this api version. This will be 'v1.0' for now and we will come up with more
            versions and a changelog later.
        name:
          type: string
          description: Optional name to define the purpose of the webhook.
        topics:
          type: array
          items:
            type: string
            enum:
            - REGISTRATIONS.EXISTING.VALIDATION_FAILED
            - REGISTRATIONS.EXISTING.VALIDATION_SUCCEEDED
          description: An array of topics to listen to. When any of these topics are
            triggered, the webhook will be pinged.
        url:
          type: string
          description: Your webhook url that will be hit once an event happens. Only
            HTTPS urls are allowed.
        key:
          type: string
          description: Secure string provided by the user. It will be used during HMCA
            process to keep the event payloads secure. Make sure to keep it safe as
            you will need it during validating event payloads. This key won't be returned
            back by any other endpoint.
        status:
          type: string
          enum:
          - ENABLED
          - DISABLED
          description: If the webhook is active or not. If a webhook is disabled it
            won't be called when a topic is triggered.
    CreateWebhookResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for this webhook. You will need this if
            you need to update or delete this webhook.
          example: 2535af08-a139-4d0c-9827-1651e46dfbcf
        api_version:
          type: string
          description: The version of the API for which you registered the webhook.
            This will be 'v1.0' for now. This helps to maintain backward compatibility.
            If in newer versions the event payload is changed, your webhook will keep
            receiving the payload from the original api version.
          example: v1.0
        name:
          type: string
          description: Optional name to define the purpose of the webhook.
          example: handle_existing_registrations_validation_failure
        topics:
          type: array
          items:
            type: string
            enum:
            - REGISTRATIONS.EXISTING.VALIDATION_FAILED
            - REGISTRATIONS.EXISTING.VALIDATION_SUCCEEDED
          description: An array of topics to listen to. When any of these topics are
            triggered, the webhook will be pinged.
        url:
          type: string
          description: Your webhook url that will be hit once a topic is triggered.
            Only https:// urls will work.
          example: https://bruno-simon.com/
        key:
          type: string
          description: Use for signing the event payloads. All the event payloads will
            be signed using this key. Make sure to keep it safe as you will need it
            during validating event payloads.
          example: couabowugowubfvow2efgofqpifhdiubvafobafou2ee
        status:
          type: string
          enum:
          - ENABLED
          - DISABLED
          description: If the webhook is active or not. If a webhook id disabled it
            won't be called when a topic is triggered.
        created_at:
          type: number
          description: Timestamp in UTC when this webhook was created.
          example: 1727284490
    CreateRefundRequest:
