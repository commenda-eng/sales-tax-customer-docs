schemas: 
  Country:
    type: string
    example: US
    description: 'ISO 3166 2-letter country code. Ex: US, IN, GB.'
  State:
    type: string
    example: CA
    description: '2-letter code for each state. Suffix of the ISO 3166-2 code. Ex:
      CA, NY, TX.'
  Address:
    type: object
    required:
    - country
    description: >
      Address object. Only `country` is required at the schema level.
      All other field requirements (including `postal_code` and `state`) vary by country — use the
      `/address-requirements` endpoint to check which fields are REQUIRED, OPTIONAL, or IGNORED for a given country.
      When provided, postal codes and state codes are validated against country-specific formats and allowed values.
    properties:
      address_line_1:
        type: string
        example: 1776 Main St
        description: Primary street address. Required for some countries (e.g., US).
      address_line_2:
        type: string
        example: 'Apt. #123'
        description: Secondary address line (apartment, suite, etc.). Optional for most countries.
      address_line_3:
        type: string
        description: Tertiary address line. Ignored for most countries.
      postal_code:
        type: string
        description: >
          Postal or ZIP code. Required for some countries (e.g., US) and optional for others (e.g., GB, DE).
          Format varies by country. For US addresses, either 5-digit ZIP or 9-digit ZIP+4 is accepted.
          Use the `/address-requirements` endpoint to check whether this field is required and to get the validation regex for each country.
        example: '90401'
      city:
        type: string
        example: Santa Monica
        description: City name. Required for some countries (e.g., US).
      state:
        "$ref": "#/schemas/State"
        description: >
          State or province code. Required for some countries (e.g., US) and optional for others (e.g., GB, DE).
          Must be a valid ISO 3166-2 subdivision code for the given country when provided.
          Use the `/address-requirements` endpoint to check whether this field is required and to get the list of valid state codes for each country.
      country:
        "$ref": "#/schemas/Country"
  Currency:
    type: string
    example: USD
    description: ISO 4217 alpha-3 currency code for the transaction.
  ProductTaxCode: 
    type: string
    example: TPP
    description: Code passed by the caller to determine taxability for this product.
      Default value, TPP, will be taxable in every jurisdiction. Additional values are available [here](/api-reference/global-indirect-tax/taxcode).
    default: TPP
  JurisdictionType:
    type: string
    enum:
    - STATE
    - COUNTY
    - CITY
    - SPECIAL_DISTRICT
    description: Type of taxing jurisdiction. This list is not exhaustive.
  Total:
    type: number
    description: This is the total amount charged to the customer, which includes
      the subtotal, shipping and handling fees, tax, and reflects any applied discounts.
  SourcePlatform: 
    type: string
    description: Platform where this entity originated.
    enum:
    - RAZORPAY
    - ZOHO_BOOKS
    - QUICKBOOKS_SANDBOX
    - QUICKBOOKS
    - XERO
    - TALLY
    - SAGE_CLOUD_ACCOUNTING
    - MS_DYNAMICS_365
    - SAGE_ZA_CLOUD_ACCOUNTING
    - MYOB_BUSINESS
    - WAVE
    - ODOO_ACCOUNTING
    - NETSUITE
    - WAFEQ
    - MEKARI_JURNAL
    - BUSY
    - ROOTFI_SANDBOX
    - QOYOD
    - SHOPIFY
    - STRIPE
    - PAYPAL
    - HUBSPOT
    - ZOHO_CRM
    - PIPEDRIVE
    - WOOCOMMERCE
    - OTHER
  ExemptionType: 
    type: string
    description: Reason for a sales tax exemption.
    enum: 
      - PURPOSE_RESALE
      - ENTITY_TYPE_NONPROFIT
      - GOVERNMENT
      - MANUFACTURER
      - AGRICULTURAL
      - OTHER
      - EXEMPT_PRODUCT
  CorporationId:
    type: string
    description: The unique identifier for a corporation.
    example: 2535af08-a139-4d0c-9827-1651e46dfbcf