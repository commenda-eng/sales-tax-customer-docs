schemas: 
  TaxCalculationRequest:
    type: object
    required:
    - corporation_id
    - transaction_date
    - transaction_currency
    - transaction_type
    - addresses
    - customer_details
    - line_items
    properties:
      corporation_id:
        type: string
        description: The unique identifier for the corporation associated with this transaction.
        example: b6d009b0-d174-463f-b030-94643c28e209
      transaction_date:
        type: string
        format: date
        description: ISO 8601 formatted date string indicating date on which the transaction took place.
      transaction_currency:
        "$ref": "./primitives.yaml#/schemas/Currency"
        description: >
          ISO 4217 alpha-3 currency code for the transaction. If omitted, defaults to the
          standard currency of the ship-to country (e.g., USD for the US, CAD for Canada,
          GBP for the UK). When this differs from the ship-to country's default currency,
          amounts are automatically converted for tax calculation and converted back in the response.
      transaction_type:
        type: string
        enum:
        - SALE
        - REFUND
        - PURCHASE
        description: |-
          Type of the transaction:
          - SALE: Standard sales transaction.
          - REFUND: Refund/return transaction with negative line item amounts.
          - PURCHASE: Purchase transaction for input tax credit tracking. Line item amounts must be negative.
      discount:
        type: number
        minimum: 0
        example: 0.99
        description: Total discount amount applied to the subtotal.
      addresses:
        type: object
        properties:
          ship_to:
            "$ref": "./primitives.yaml#/schemas/Address"
            description: >
              Destination address for the transaction. If omitted, the API falls back to the default shipping address
              of the customer specified in `customer_details.customer_id`. If neither is available, the request fails
              with a `MISSING_SHIP_TO_ADDRESS` error. Address fields are validated against per-country requirements —
              use the `/address-requirements` endpoint to check which fields are required for each country.
          ship_from:
            "$ref": "./primitives.yaml#/schemas/Address"
            description: >
              Origin address for the transaction. Required for certain destination countries (e.g., GB).
              If required but not provided, the request fails with a `MISSING_SHIP_FROM_ADDRESS` error.
              When the destination is US, the ship-from state must be a valid US state code and the postal code
              must be a valid US ZIP code.
        description: >
          Shipping origin and destination addresses. The `ship_to` field is optional when a `customer_id` is provided
          that has a default shipping address on file. The `ship_from` field is required for certain destination countries.
          All address fields are validated against country-specific requirements — query `/address-requirements` to check
          which fields are required, optional, or ignored for a given country.
      customer_details:
        type: object
        properties:
          customer_id:
            type: string
            description: Unique identifier for the customer for this transaction. Used for exemptions and for shipping address. If fields on the customer conflict with fields on this calculation, the ones on the calculation will be prioritized.
        description: Customer details for this transaction.
      exemption_reason:
        "$ref": "./primitives.yaml#/schemas/ExemptionType"
        description: Optional exemption reason to apply to the entire transaction. When provided, the transaction may be fully or partially exempt from tax based on the exemption type and applicable jurisdiction rules.
      line_items:
        type: object
        required:
        - items
        properties:
          items:
            description: >
             Array of line items representing individual products or services in the transaction. 
             For each line item either pass the tax_code or the product_id. If the product_id is passed the tax_code will be fetched from the product itself. If no `product_taxaiblity_code` is available, `TPP` will be used as the fallback.
            type: array
            items:
              type: object
              required:
              - quantity
              - amount
              properties:
                line_number:
                  type: integer
                  minimum: 1
                  description: Optional line number for this item.
                line_item_id:
                  type: string
                  description: Optional identifier to uniquely identify this line item.
                product_taxability_code:
                 "$ref": "./primitives.yaml#/schemas/ProductTaxCode"
                quantity:
                  type: number
                  description: >
                    Quantity of units. Must not be zero. For REFUND or PURCHASE transactions,
                    negative values are accepted. Cannot be negative simultaneously with `amount`.
                amount:
                  type: number
                  description: >
                    Total price for the line item. For REFUND or PURCHASE transactions,
                    negative values are accepted. Cannot be negative simultaneously with `quantity`.
                discount:
                  type: number
                  minimum: 0
                  description: Discount amount for this line item.
                product_id:
                  type: string
                  description: The unique identifier for the product.
                product_source_platform:
                  "$ref": "./primitives.yaml#/schemas/SourcePlatform"
                product_source_platform_id:
                  type: string
                  description: The identifier for the product on the source platform.
  TaxCalculationResponse:
    type: object
    properties:
      corporation_id:
        type: string
        description: The unique identifier for the corporation associated with this transaction.
        example: b6d009b0-d174-463f-b030-94643c28e209
      transaction_date:
        type: string
        format: date
        description: ISO 8601 formatted date string indicating date on which the transaction took place.
      transaction_currency:
        "$ref": "./primitives.yaml#/schemas/Currency"
      calculation_currency:
        type: string
        description: >
          ISO 4217 alpha-3 currency code representing the currency used internally for
          the tax computation. This is the default currency of the ship-to country
          (e.g., USD for the US, CAD for Canada, GBP for the UK).
        example: USD
      exchange_rate:
        type: number
        format: float
        description: >
          The exchange rate applied between the transaction currency and the calculation
          currency. When no conversion is needed (i.e., the transaction currency matches
          the ship-to country's default currency), this value is 1.0.
        example: 1.0
      discount:
        type: number
        format: float
        example: 0.99
        description: Total discount amount applied to the transaction.
      customer_details:
        type: object
        properties:
          customer_id:
            type: string
            description: Unique identifier for the customer for this transaction.
        description: Customer details for this transaction.
      tax_currency:
        "$ref": "./primitives.yaml#/schemas/Currency"
        description: ISO 4217 alpha-3 currency code representing the currency in which tax details are reported. This matches the transaction currency.
      addresses:
        type: object
        properties:
          ship_from:
            "$ref": "./primitives.yaml#/schemas/Address"
          ship_to:
            "$ref": "./primitives.yaml#/schemas/Address"
        description: The addresses for this transaction, including shipping origin and destination.
      line_items:
        type: array
        items:
          type: object
          properties:
            amount:
              type: number
              format: float
              description: Total price for the line item.
            taxable_amount:
              type: number
              format: float
              description: The amount that is considered taxable for this line item.
            quantity:
              type: number
              format: float
              description: Quantity of units purchased.
            tax_code:
              type: string
              description: The tax code used for this line item.
            product_id:
              type: string
              description: The unique identifier for the product.
            effective_tax_rate:
              type: number
              format: float
              description: The effective tax rate applied to this line item.
            tax_breakdown:
              type: array
              items:
                type: object
                properties:
                  jurisdiction:
                    type: string
                    description: Name of the taxing jurisdiction.
                    example: California
                  jurisdiction_type:
                    type: string
                    enum:
                    - STATE
                    - COUNTY
                    - CITY
                    - SPECIAL_DISTRICT
                    description: Type of tax jurisdiction.
                  rate:
                    type: number
                    format: float
                    example: 6.25
                    description: Tax rate for this jurisdiction as a percentage.
            total_tax_due:
              type: number
              format: float
              example: 1.03
              description: Total amount of sales tax to charge for line item.
